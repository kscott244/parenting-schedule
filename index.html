<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Parenting Schedule</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: Arial, sans-serif; background: #f0f0f0; padding: 14px 8px; }

  h1 { text-align: center; font-size: 18px; font-weight: bold; margin-bottom: 4px; color: #222; }
  .subtitle { text-align: center; font-size: 10px; color: #666; margin-bottom: 14px; }

  /* Daycare closure button */
  .daycare-bar {
    max-width: 700px; margin: 0 auto 14px;
    display: flex; justify-content: flex-end;
  }
  .dc-btn {
    background: #e6a817; color: white; border: none; border-radius: 7px;
    padding: 9px 16px; font-size: 12px; font-weight: bold; cursor: pointer;
  }
  .dc-btn:hover { background: #c8920f; }

  /* Modal */
  .modal-overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,0.5); z-index: 100;
    align-items: flex-end; justify-content: center;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: white; border-radius: 16px 16px 0 0;
    padding: 24px 22px 40px;
    width: 100%; max-width: 500px;
    box-shadow: 0 -4px 20px rgba(0,0,0,0.2);
  }
  .modal h3 { font-size: 15px; margin-bottom: 14px; color: #222; }
  .modal label { font-size: 11px; font-weight: bold; color: #555; display: block; margin-bottom: 4px; }
  .modal input, .modal textarea {
    width: 100%; padding: 8px 10px; border: 1px solid #ccc; border-radius: 6px;
    font-size: 13px; margin-bottom: 12px; font-family: Arial, sans-serif;
  }
  .modal-btns { display: flex; gap: 8px; }
  .modal-save {
    flex: 1; padding: 10px; background: #e6a817; color: white;
    border: none; border-radius: 6px; font-size: 13px; font-weight: bold; cursor: pointer;
  }
  .modal-cancel {
    flex: 1; padding: 10px; background: #eee; color: #444;
    border: none; border-radius: 6px; font-size: 13px; cursor: pointer;
  }
  .modal-error { color: #c0392b; font-size: 11px; margin-bottom: 8px; display: none; }

  /* Legend */
  .legend {
    display: flex; justify-content: center; gap: 12px;
    margin-bottom: 14px; font-size: 10px; flex-wrap: wrap; align-items: center;
  }
  .leg { display: flex; align-items: center; gap: 5px; }
  .leg-sq { width: 18px; height: 18px; border-radius: 3px; flex-shrink: 0; }
  .leg-sq-split { width: 18px; height: 18px; border-radius: 3px; overflow: hidden; display: flex; flex-shrink: 0; }
  .leg-sq-split .half { flex: 1; }

  /* Month */
  .month {
    background: white; border-radius: 8px; overflow: hidden;
    box-shadow: 0 1px 4px rgba(0,0,0,0.15);
    margin-bottom: 0; width: 100%; max-width: 700px;
    margin-left: auto; margin-right: auto;
  }
  .month-title {
    background: #222; color: white; text-align: center;
    font-size: 13px; font-weight: bold; padding: 7px; letter-spacing: 1px;
  }
  .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); }
  .dow {
    text-align: center; font-size: 9px; font-weight: bold;
    padding: 4px 1px; background: #eee; border: 1px solid #ddd; color: #555;
  }
  .cell {
    border: 1px solid #e8e8e8; height: 72px; padding: 3px 2px 2px;
    display: flex; flex-direction: column; align-items: center;
    background: white; overflow: hidden;
  }
  .cell.empty { background: #fafafa; }
  .cell.daycare-closed { background: #fffbea; }
  .day-num {
    font-size: 10px; font-weight: bold; color: #333;
    align-self: flex-start; padding-left: 2px; margin-bottom: 2px; line-height: 1;
  }
  .shape { width: 90%; flex: 1; border-radius: 5px; overflow: hidden; display: flex; margin-bottom: 3px; }
  .shape .solid { width: 100%; }
  .shape .left-half { width: 50%; }
  .shape .right-half { width: 50%; }
  .shape.dc-shape {
    background: #e6a817; align-items: center; justify-content: center;
    font-size: 16px;
  }
  .shape.exc-shape {
    background: #8e44ad; align-items: center; justify-content: center;
    font-size: 16px;
  }
  .label-row {
    display: flex; width: 95%; justify-content: space-between;
    font-size: 8px; font-weight: bold; line-height: 1; padding: 0 1px;
  }
  .lbl-dad { color: #1a4f8a; }
  .lbl-mom { color: #c0392b; }
  .lbl-dc { color: #9a6800; font-size: 7.5px; }
  .lbl-exc { color: #6a00aa; font-size: 7.5px; }
  .lbl-center { text-align: center; width: 100%; }

  /* Keys below months */
  .month-gap { max-width: 700px; margin: 0 auto 16px; }
  .key-box {
    max-width: 700px; margin: 0 auto 16px;
    border-radius: 0 0 8px 8px; padding: 10px 14px;
  }
  .key-box.dc-key { background: #fffbea; border: 1px solid #e6c84e; }
  .key-box.exc-key { background: #f5f0ff; border: 1px solid #c9b0f0; }
  .key-title { font-size: 10px; font-weight: bold; margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.4px; }
  .key-title.dc { color: #9a6800; }
  .key-title.exc { color: #5a00aa; }
  .key-item { display: flex; gap: 8px; align-items: flex-start; font-size: 11px; color: #333; margin-bottom: 4px; line-height: 1.4; }
  .key-bullet { width: 14px; height: 14px; border-radius: 3px; flex-shrink: 0; margin-top: 1px; }

  #months-container { padding-bottom: 30px; }
</style>
</head>
<body>

<h1>Parenting Schedule 2026</h1>
<p class="subtitle">All exchanges at daycare &nbsp;·&nbsp; Left = Drop-off &nbsp;·&nbsp; Right = Pickup &nbsp;·&nbsp; <span style="color:#8e44ad;font-weight:bold;">⚡ Purple = Exception</span> &nbsp;·&nbsp; <span style="color:#9a6800;font-weight:bold;">🚫 Yellow = Daycare Closed</span></p>

<div class="daycare-bar">
  <button class="dc-btn" onclick="openModal()">🚫 Mark Daycare Closed</button>
</div>

<!-- Modal -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <h3>🚫 Mark Daycare Closed</h3>
    <label>Date</label>
    <input type="date" id="dcDate" />
    <label>Reason (optional)</label>
    <input type="text" id="dcNote" placeholder="e.g. Staff Training Day" />
    <div class="modal-btns">
      <button class="modal-cancel" onclick="closeModal()">Cancel</button>
      <button class="modal-save" onclick="saveClosure()">Save</button>
    </div>
  </div>
</div>

<div class="legend" id="legend">
  <div class="leg"><div class="leg-sq" style="background:#4472C4"></div><span>Dad full day</span></div>
  <div class="leg"><div class="leg-sq" style="background:#E85555"></div><span>Mom full day</span></div>
  <div class="leg">
    <div class="leg-sq-split">
      <div class="half" style="background:#4472C4"></div>
      <div class="half" style="background:#E85555"></div>
    </div>
    <span>Dad drops / Mom picks up</span>
  </div>
  <div class="leg">
    <div class="leg-sq-split">
      <div class="half" style="background:#E85555"></div>
      <div class="half" style="background:#4472C4"></div>
    </div>
    <span>Mom drops / Dad picks up</span>
  </div>
  <div class="leg"><div class="leg-sq" style="background:#8e44ad;display:flex;align-items:center;justify-content:center;font-size:10px;color:white;">⚡</div><span>Exception</span></div>
  <div class="leg"><div class="leg-sq" style="background:#e6a817;display:flex;align-items:center;justify-content:center;font-size:10px;">🚫</div><span>Daycare Closed</span></div>
</div>

<div id="months-container"></div>

<script>
// ── Constants ──────────────────────────────────────────────────────────────
const DAD_COLOR = '#4472C4';
const MOM_COLOR = '#E85555';
const EXC_COLOR = '#8e44ad';
const DC_COLOR  = '#e6a817';

// ── Schedule config ────────────────────────────────────────────────────────
// Start date: Friday March 27, 2026 — Mom has kids (start of her Fri-Mon block)
const SCHEDULE_START    = '2026-03-27';
const START_PARENT      = 'b';   // b = Mom
const CYCLE_START_DOW   = 5;     // 5 = Friday (Fri-Mon 3-night block)
const DISPLAY_START_MONTH = 3;   // March
const DISPLAY_START_YEAR  = 2026;
const NUM_MONTHS          = 10;  // March–December 2026

// ── One-time exceptions ────────────────────────────────────────────────────
const EXCEPTIONS = {
  '2026-04-05': 'Easter Sunday — Mom picks kids up from Dad\'s home in the morning. Mom drops kids back to Dad at 2PM. Not at daycare.'
};

// ── 2-2-3 schedule builder ────────────────────────────────────────────────
function buildSchedule() {
  const startDate = new Date(SCHEDULE_START + 'T00:00:00');
  const startDOW  = startDate.getDay();
  const daysBack  = (startDOW - CYCLE_START_DOW + 7) % 7;
  const anchor    = new Date(startDate);
  anchor.setDate(anchor.getDate() - daysBack);

  function ownerAtIdx(idx, threeNight) {
    if (idx <= 2) return threeNight;
    if (idx <= 4) return threeNight === 'a' ? 'b' : 'a';
    return threeNight;
  }
  function isDropoff(idx) { return idx === 0 || idx === 3 || idx === 5; }

  let cycleOwner;
  const db = daysBack;
  if (db <= 2) cycleOwner = START_PARENT;
  else if (db <= 4) cycleOwner = START_PARENT === 'a' ? 'b' : 'a';
  else cycleOwner = START_PARENT;

  const sched = {};
  const totalDays = NUM_MONTHS * 31 + 15;

  for (let i = 0; i < totalDays; i++) {
    const d = new Date(anchor);
    d.setDate(d.getDate() + i);
    const idx      = i % 7;
    const cycleNum = Math.floor(i / 7);
    const threeNight = cycleNum % 2 === 0 ? cycleOwner : (cycleOwner === 'a' ? 'b' : 'a');
    const owner    = ownerAtIdx(idx, threeNight);
    let dropper    = null;
    if (isDropoff(idx)) {
      const pi = idx === 0 ? 6 : idx - 1;
      const pc = idx === 0 ? cycleNum - 1 : cycleNum;
      const pt = pc % 2 === 0 ? cycleOwner : (cycleOwner === 'a' ? 'b' : 'a');
      dropper = ownerAtIdx(pi, pt);
    }
    const iso = isoDate(d);
    sched[iso] = { owner, dropper, exception: EXCEPTIONS[iso] || null };
  }
  return sched;
}

// ── Storage helpers ────────────────────────────────────────────────────────
async function loadClosures() {
  try {
    const r = await window.storage.get('daycare-closures', true);
    return r ? JSON.parse(r.value) : {};
  } catch { return {}; }
}

async function saveClosures(obj) {
  await window.storage.set('daycare-closures', JSON.stringify(obj), true);
}

// ── Modal ──────────────────────────────────────────────────────────────────
function openModal() {
  document.getElementById('dcDate').value = '';
  document.getElementById('dcNote').value = '';
  document.getElementById('modalOverlay').classList.add('open');
  document.getElementById('dcDate').focus();
}
function closeModal() {
  document.getElementById('modalOverlay').classList.remove('open');
}

async function saveClosure() {
  const date = document.getElementById('dcDate').value;
  const note = document.getElementById('dcNote').value.trim() || 'Daycare Closed';

  if (!date) { alert('Please select a date.'); return; }

  const closures = await loadClosures();
  closures[date] = note;
  await saveClosures(closures);
  closeModal();
  renderAll();
}

// ── Rendering ─────────────────────────────────────────────────────────────
function isoDate(d) {
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

function makeShape(info, closures) {
  const shape = document.createElement('div');
  shape.className = 'shape';

  const iso = info.iso;

  if (closures[iso]) {
    shape.classList.add('dc-shape');
    shape.textContent = '🚫';
    return shape;
  }
  if (info.exception) {
    shape.classList.add('exc-shape');
    shape.textContent = '⚡';
    return shape;
  }
  if (!info.dropper) {
    const s = document.createElement('div');
    s.className = 'solid';
    s.style.background = info.owner === 'a' ? DAD_COLOR : MOM_COLOR;
    shape.appendChild(s);
  } else {
    const l = document.createElement('div'); l.className = 'left-half';
    l.style.background = info.dropper === 'a' ? DAD_COLOR : MOM_COLOR;
    const r = document.createElement('div'); r.className = 'right-half';
    r.style.background = info.owner === 'a' ? DAD_COLOR : MOM_COLOR;
    shape.appendChild(l); shape.appendChild(r);
  }
  return shape;
}

function makeLabel(info, closures) {
  const row = document.createElement('div');
  row.className = 'label-row';

  const iso = info.iso;

  if (closures[iso]) {
    const c = document.createElement('div');
    c.className = 'lbl-center lbl-dc';
    c.textContent = 'Daycare Closed';
    row.appendChild(c);
    return row;
  }
  if (info.exception) {
    const c = document.createElement('div');
    c.className = 'lbl-center lbl-exc';
    c.textContent = 'Exception';
    row.appendChild(c);
    return row;
  }
  if (!info.dropper) {
    const c = document.createElement('div');
    c.className = 'lbl-center ' + (info.owner === 'a' ? 'lbl-dad' : 'lbl-mom');
    c.textContent = info.owner === 'a' ? 'Dad' : 'Mom';
    row.appendChild(c);
  } else {
    const l = document.createElement('div');
    l.className = info.dropper === 'a' ? 'lbl-dad' : 'lbl-mom';
    l.textContent = info.dropper === 'a' ? 'Dad' : 'Mom';
    const r = document.createElement('div');
    r.className = info.owner === 'a' ? 'lbl-dad' : 'lbl-mom';
    r.textContent = info.owner === 'a' ? 'Dad' : 'Mom';
    row.appendChild(l); row.appendChild(r);
  }
  return row;
}

async function renderAll() {
  const sched   = buildSchedule();
  const closures = await loadClosures();
  const monthNames = ['January','February','March','April','May','June','July','August','September','October','November','December'];
  const container = document.getElementById('months-container');
  container.innerHTML = '';

  for (let m = 0; m < NUM_MONTHS; m++) {
    let mo = DISPLAY_START_MONTH + m;
    let yr = DISPLAY_START_YEAR;
    while (mo > 12) { mo -= 12; yr++; }

    const monthExceptions = [];
    const monthClosures   = [];

    const wrap = document.createElement('div'); wrap.className = 'month';
    const titleEl = document.createElement('div'); titleEl.className = 'month-title';
    titleEl.textContent = monthNames[mo-1].toUpperCase() + ' ' + yr;
    wrap.appendChild(titleEl);

    const grid = document.createElement('div'); grid.className = 'cal-grid';
    ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'].forEach(d => {
      const h = document.createElement('div'); h.className = 'dow'; h.textContent = d; grid.appendChild(h);
    });

    const firstDOW = new Date(yr, mo-1, 1).getDay();
    const totalD   = new Date(yr, mo, 0).getDate();
    for (let i = 0; i < firstDOW; i++) {
      const e = document.createElement('div'); e.className = 'cell empty'; grid.appendChild(e);
    }

    for (let d = 1; d <= totalD; d++) {
      const iso = `${yr}-${String(mo).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
      const info = sched[iso] ? { ...sched[iso], iso } : null;
      const cell = document.createElement('div');

      let cellClass = 'cell';
      if (info && closures[iso]) cellClass += ' daycare-closed';
      cell.className = cellClass;

      const num = document.createElement('div'); num.className = 'day-num'; num.textContent = d;
      cell.appendChild(num);

      if (info) {
        cell.appendChild(makeShape(info, closures));
        cell.appendChild(makeLabel(info, closures));
        if (info.exception) monthExceptions.push({ d, iso, note: info.exception });
        if (closures[iso]) monthClosures.push({ d, iso, note: closures[iso] });
      }
      grid.appendChild(cell);
    }

    wrap.appendChild(grid);
    container.appendChild(wrap);

    // Keys
    if (monthClosures.length > 0 || monthExceptions.length > 0) {
      if (monthClosures.length > 0) {
        const key = document.createElement('div'); key.className = 'key-box dc-key';
        const kt = document.createElement('div'); kt.className = 'key-title dc'; kt.textContent = '🚫 Daycare Closures';
        key.appendChild(kt);
        monthClosures.forEach(({ iso, note }) => {
          const item = document.createElement('div'); item.className = 'key-item';
          const bullet = document.createElement('div'); bullet.className = 'key-bullet'; bullet.style.background = DC_COLOR;
          const text = document.createElement('div');
          const dl = new Date(iso + 'T00:00:00').toLocaleDateString('en-US', { weekday:'short', month:'short', day:'numeric' });
          text.innerHTML = `<strong>${dl}</strong> — ${note}`;
          item.appendChild(bullet); item.appendChild(text); key.appendChild(item);
        });
        container.appendChild(key);
      }
      if (monthExceptions.length > 0) {
        const key = document.createElement('div'); key.className = 'key-box exc-key';
        const kt = document.createElement('div'); kt.className = 'key-title exc'; kt.textContent = '⚡ Exception Key';
        key.appendChild(kt);
        monthExceptions.forEach(({ iso, note }) => {
          const item = document.createElement('div'); item.className = 'key-item';
          const bullet = document.createElement('div'); bullet.className = 'key-bullet'; bullet.style.background = EXC_COLOR;
          const text = document.createElement('div');
          const dl = new Date(iso + 'T00:00:00').toLocaleDateString('en-US', { weekday:'short', month:'short', day:'numeric' });
          text.innerHTML = `<strong>${dl}</strong> — ${note}`;
          item.appendChild(bullet); item.appendChild(text); key.appendChild(item);
        });
        container.appendChild(key);
      }
    } else {
      const gap = document.createElement('div'); gap.style.marginBottom = '16px';
      container.appendChild(gap);
    }
  }
}

// ── Boot ───────────────────────────────────────────────────────────────────
renderAll();
</script>
</body>
</html>
